# Railway config – BACKEND služba (Root Directory = prázdny (koreň repa))
# Env: DATABASE_URL, WEB_ORIGIN, KEEPI_API_URL, KEEPI_API_KEY,
#      KEEPI_WEBHOOK_SECRET, SERVICE_MANAGER_WEBHOOK_SECRET (PORT dodá Railway)

[build]
buildCommand = "npm ci && npm run build"

[deploy]
# idempotentné – vytvorí schému len ak ešte neexistuje
preDeployCommand = "npm run db:init"
startCommand = "npm start"
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
