# Railway config – WEB služba (Root Directory = web)
# Env: API_URL = URL backend služby
#   interná sieť: http://<backend-service>.railway.internal:<PORT backendu>
#   alebo verejná https://<backend>.up.railway.app

[build]
buildCommand = "npm install --no-audit --no-fund && npm run build"

[deploy]
startCommand = "npm start"
healthcheckPath = "/"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
